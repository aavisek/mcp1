# This is 3rd Connector (fresh identity)
# Azure AVD Connector 3 for MCP tools, secured with OAuth (Entra ID).
swagger: '2.0'
info:
  title: AzureAvdConnector3
  description: >
    Connector 3 for Azure AVD MCP tools secured with OAuth (Entra ID).
  version: '1.0'

host: azure-mcp-classic-files-server.calmpebble-33abca6a.centralindia.azurecontainerapps.io
basePath: /
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json

paths:
